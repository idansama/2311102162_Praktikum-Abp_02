<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendaftaran Praktikan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { max-width: 600px; margin: 50px auto; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h2 class="mb-0">Formulir Pendaftaran Praktikan</h2>
            </div>
            <div class="card-body p-4">
                <form action="#" method="POST">
                    
                    <div class="mb-3 row">
                        <label for="nama_id" class="col-sm-4 col-form-label fw-bold">Nama</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" name="nama_input" id="nama_id" value="Praktikan" readonly>
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label for="uname_id" class="col-sm-4 col-form-label fw-bold">Username</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" name="uname_input" id="uname_id" value="Praktikum" disabled>
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label for="password_id" class="col-sm-4 col-form-label fw-bold">Password</label>
                        <div class="col-sm-8">
                            <input type="password" class="form-control" name="password_input" id="password_id" placeholder="Input Password">
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label for="email_id" class="col-sm-4 col-form-label fw-bold">Email</label>
                        <div class="col-sm-8">
                            <input type="email" class="form-control" name="email_input" id="email_id" placeholder="Input Email">
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label class="col-sm-4 col-form-label fw-bold">Jenis Kelamin</label>
                        <div class="col-sm-8 d-flex align-items-center">
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="jk_input" id="pria" value="Pria">
                                <label class="form-check-label" for="pria">Pria</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="jk_input" id="wanita" value="Wanita">
                                <label class="form-check-label" for="wanita">Wanita</label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label class="col-sm-4 col-form-label fw-bold">Hobi</label>
                        <div class="col-sm-8">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="renang" value="Renang">
                                <label class="form-check-label" for="renang">Renang</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="bersepeda" value="Bersepeda">
                                <label class="form-check-label" for="bersepeda">Bersepeda</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="memancing" value="Memancing">
                                <label class="form-check-label" for="memancing">Memancing</label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label for="jp_id" class="col-sm-4 col-form-label fw-bold">Jenjang Pendidikan</label>
                        <div class="col-sm-8">
                            <select class="form-select" name="jp_input" id="jp_id">
                                <option value="" selected>--- Pilih ---</option>
                                <option value="D3">Tamat D3</option>
                                <option value="S1">Tamat S1</option>
                                <option value="S2">Tamat S2</option>
                                <option value="S3">Tamat S3</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4 row">
                        <label for="kritik_saran" class="col-sm-4 col-form-label fw-bold">Kritik & Saran</label>
                        <div class="col-sm-8">
                            <textarea class="form-control" id="kritik_saran" name="kritik_saran" rows="3"></textarea>
                        </div>
                    </div>

                    <div class="text-end">
                        <button type="button" class="btn btn-outline-secondary me-2">Cancel</button>
                        <button type="submit" class="btn btn-primary px-4">Submit</button>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
